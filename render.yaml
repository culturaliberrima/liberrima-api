services:
  - type: web
    name: liberrima-api
    env: node
    buildCommand: npm install && node src/setup.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: liberrima-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: culturaliberrima@gmail.com
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: liberrima-db
    databaseName: liberrima
    user: liberrima
